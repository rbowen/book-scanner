<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Book Scanner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e;
  color: #eee;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  padding: 12px 16px;
  background: #16213e;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
header h1 { font-size: 1.2rem; }
#count {
  background: #0f3460;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 0.9rem;
}

/* Tab navigation */
.tabs {
  display: flex;
  background: #0f3460;
}
.tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  font-weight: 600;
  font-size: 0.95rem;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
}
.tab.active {
  background: #16213e;
  border-bottom-color: #4ecca3;
  color: #4ecca3;
}
.tab:not(.active) { color: #888; }

/* Panels */
.panel { display: none; flex-direction: column; flex: 1; }
.panel.active { display: flex; }

/* Scanner panel */
#camera-container {
  position: relative;
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  aspect-ratio: 4/3;
  background: #000;
  overflow: hidden;
}
video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
#scan-line {
  position: absolute;
  top: 50%;
  left: 10%;
  right: 10%;
  height: 2px;
  background: #e94560;
  box-shadow: 0 0 8px #e94560;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
#status {
  text-align: center;
  padding: 8px;
  font-size: 0.85rem;
  color: #aaa;
}
#last-scan {
  text-align: center;
  padding: 8px 16px;
  font-size: 1.1rem;
  color: #4ecca3;
  min-height: 2.5em;
}
#isbn-entry {
  padding: 8px 16px;
  display: flex;
  gap: 8px;
}
#isbn-entry input {
  flex: 1;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #0f3460;
  background: #16213e;
  color: #eee;
  font-size: 1rem;
  font-family: monospace;
}
#isbn-entry button {
  flex: 0;
  padding: 10px 16px;
  background: #0f3460;
  color: #eee;
}

/* Manual panel */
.manual-form {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.manual-form label {
  font-size: 0.85rem;
  color: #aaa;
  margin-bottom: 2px;
}
.manual-form input[type="text"] {
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #0f3460;
  background: #16213e;
  color: #eee;
  font-size: 1rem;
}
.cover-capture {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.crop-container {
  position: relative;
  width: 100%;
  max-width: 300px;
  margin: 0 auto;
  touch-action: none;
  display: none;
}
.crop-container img {
  width: 100%;
  display: block;
  border-radius: 6px;
}
.crop-overlay {
  position: absolute;
  border: 2px dashed #4ecca3;
  background: rgba(78,204,163,0.1);
  cursor: move;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
}
.crop-handle {
  position: absolute;
  bottom: -6px;
  right: -6px;
  width: 20px;
  height: 20px;
  background: #4ecca3;
  border-radius: 50%;
  cursor: nwse-resize;
  touch-action: none;
}
.crop-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  justify-content: center;
}
.crop-actions button {
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 0.85rem;
}
.crop-confirm { background: #4ecca3 !important; color: #1a1a2e !important; }
.crop-cancel { background: #e94560 !important; color: #fff !important; }
.cover-capture .preview {
  width: 120px;
  height: 160px;
  background: #16213e;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  margin: 0 auto;
}
.cover-capture .preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.cover-capture .preview .placeholder {
  color: #555;
  font-size: 2rem;
}
.cover-btn {
  background: #0f3460 !important;
  color: #eee !important;
  text-align: center;
}
.add-manual-btn {
  background: #4ecca3 !important;
  color: #1a1a2e !important;
  font-size: 1rem;
  padding: 14px !important;
}

/* Actions */
#actions {
  padding: 12px 16px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
button {
  flex: 1;
  min-width: 70px;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
}
#copy-btn { background: #4ecca3; color: #1a1a2e; }
#clear-btn { background: #e94560; color: #fff; }
#share-btn { background: #0f3460; color: #eee; }
.flash { animation: flashGreen 0.3s; }
@keyframes flashGreen { 0% { background: #4ecca3; } 100% { background: #1a1a2e; } }
#error { padding: 16px; text-align: center; color: #e94560; }
</style>
</head>
<body>

<header>
  <h1>📚 Book Scanner</h1>
  <span id="count">0 books</span> <span style="font-size:0.6rem;color:#555" onclick="window._showSettings()">v1.9 ⚙️</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="window._switchTab('scan')">📷 Scan</div>
  <div class="tab" onclick="window._switchTab('manual')">✏️ Manual</div>
</div>

<!-- Scan Panel -->
<div id="scan-panel" class="panel active">
  <div id="camera-container">
    <video id="video" autoplay playsinline></video>
    <div id="scan-line"></div>
  </div>
  <div id="status">Initializing camera...</div>
  <div id="last-scan"></div>
  <div id="isbn-entry">
    <input type="text" id="manual-isbn" placeholder="Type ISBN manually" inputmode="numeric">
    <button onclick="window._addManualISBN()">Add</button>
    <button onclick="window._scanISBNText()" style="background:#7b68ee; color:#fff; padding:10px 12px; flex:0; font-size:0.8rem;">📖 OCR</button>
  </div>
</div>

<!-- Manual Entry Panel -->
<div id="manual-panel" class="panel">
  <div class="manual-form">
    <div>
      <label>Title *</label>
      <input type="text" id="m-title" placeholder="Book title">
    </div>
    <div>
      <label>Author *</label>
      <input type="text" id="m-author" placeholder="Author name">
    </div>
    <div class="cover-capture">
      <label>Cover Photo (optional)</label>
      <div class="crop-container" id="crop-container">
        <img id="crop-img" src="">
        <div class="crop-overlay" id="crop-overlay"></div>
        <div class="crop-actions">
          <button class="crop-confirm" onclick="window._cropConfirm()">✂️ Crop</button>
          <button class="crop-cancel" onclick="window._cropCancel()">✕ Cancel</button>
        </div>
      </div>
      <div class="preview" id="cover-preview">
        <span class="placeholder">📷</span>
      </div>
      <button class="cover-btn" onclick="window._takeCoverPhoto()">📸 Take Cover Photo</button>
      <input type="file" id="cover-input" accept="image/*" capture="environment" style="display:none">
    </div>
    <button class="cover-btn" style="background:#7b68ee !important; margin-top:4px;" onclick="window._takeLooseCover()">📷 Cover Photo Only (assign later)</button>
    <button class="add-manual-btn" onclick="window._addManualBook()">✅ Add Book</button>
    <div id="manual-status" style="text-align:center; min-height:1.5em; color:#4ecca3;"></div>
  </div>
</div>


<div id="actions">
  <button id="copy-btn" onclick="window._exportData('copy')">📋 Copy</button>
  <button id="share-btn" onclick="window._exportData('share')">📤 Sync</button>
  <button id="clear-btn" onclick="window._clearAll()">🗑️ Clear</button>
</div>

<div id="error"></div>

<!-- Settings panel (hidden by default) -->
<div id="settings-panel" style="display:none; padding:16px; background:#0f3460; margin:8px 16px; border-radius:8px;">
  <h3 style="font-size:0.95rem; margin-bottom:8px;">⚙️ Settings</h3>
  <div id="dbx-status" style="font-size:0.85rem; margin-bottom:8px; color:#4ecca3;"></div>
  <div style="display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;">
    <button onclick="window._authorizeDropbox()" style="background:#4ecca3; color:#1a1a2e; padding:10px 16px; flex:1;">🔗 Authorize Dropbox</button>
    <button onclick="window._disconnectDropbox()" style="background:#e94560; color:#fff; padding:10px 16px; flex:0;">Disconnect</button>
    <button onclick="window._hideSettings()" style="background:#555; color:#eee; padding:10px 16px; flex:0;">Close</button>
  </div>
  <p style="font-size:0.7rem; color:#666; margin-top:8px;">Connects to your Dropbox Apps/book-scanner folder. One-time authorization.</p>
</div>

<script>
(function() {
  // Storage helpers
  function storageGet(key) {
    try { return localStorage.getItem(key); } catch(e) { return null; }
  }
  function storageSet(key, val) {
    try { localStorage.setItem(key, val); } catch(e) {}
  }

  // Data model: array of book entries
  // ISBN-scanned: { type: "isbn", isbn: "978..." }
  // Manual: { type: "manual", title: "...", author: "...", cover: "data:..." (base64) or "" }
  var books = JSON.parse(storageGet('scannedBooks') || '[]');

  // Migration: if old format (plain ISBN strings), convert
  if (books.length > 0 && typeof books[0] === 'string') {
    books = books.map(function(isbn) { return { type: 'isbn', isbn: isbn }; });
    storageSet('scannedBooks', JSON.stringify(books));
  }

  var scanning = true;
  var lastScanTime = 0;
  var coverDataURL = '';

  var video = document.getElementById('video');
  var statusEl = document.getElementById('status');
  var lastScanEl = document.getElementById('last-scan');
  var countEl = document.getElementById('count');
  var errorEl = document.getElementById('error');

  // ─── Tab switching ───
  window._switchTab = function(tab) {
    document.querySelectorAll('.tab').forEach(function(t, i) {
      t.classList.toggle('active', (i === 0 && tab === 'scan') || (i === 1 && tab === 'manual'));
    });
    document.getElementById('scan-panel').classList.toggle('active', tab === 'scan');
    document.getElementById('manual-panel').classList.toggle('active', tab === 'manual');
  };

  // ─── OCR: Scan ISBN from text (copyright page photo) ───
  window._scanISBNText = function() {
    if (!('TextDetector' in window)) {
      lastScanEl.textContent = '⚠️ TextDetector not supported on this device';
      return;
    }
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.capture = 'environment';
    input.onchange = function(e) {
      var file = e.target.files[0];
      if (!file) return;
      lastScanEl.textContent = '🔍 Scanning text...';
      var img = new Image();
      img.onload = function() {
        var detector = new TextDetector();
        detector.detect(img).then(function(texts) {
          var allText = texts.map(function(t) { return t.rawValue; }).join(' ');
          var isbn13 = allText.match(/97[89][\d\-\s]{10,16}\d/);
          var isbn10 = allText.match(/\d[\d\-\s]{8,12}[\dXx]/);
          var isbnLabel = allText.match(/ISBN[:\s\-]*([0-9X\-\s]{10,17})/i);
          var found = '';
          if (isbnLabel) {
            found = isbnLabel[1].replace(/[\-\s]/g, '');
          } else if (isbn13) {
            found = isbn13[0].replace(/[\-\s]/g, '');
          } else if (isbn10) {
            found = isbn10[0].replace(/[\-\s]/g, '');
          }
          if (found && (found.length === 10 || found.length === 13)) {
            addISBN(found);
          } else if (found) {
            document.getElementById('manual-isbn').value = found;
            lastScanEl.textContent = '⚠️ Found "' + found + '" — check and tap Add';
          } else {
            lastScanEl.textContent = '❌ No ISBN found in image. Try manual entry.';
          }
        }).catch(function(err) {
          lastScanEl.textContent = '❌ OCR failed: ' + err.message;
        });
      };
      img.src = URL.createObjectURL(file);
    };
    input.click();
  };

  // ─── UI update ───
  function updateUI() {
    countEl.textContent = books.length + ' book' + (books.length !== 1 ? 's' : '');
    storageSet('scannedBooks', JSON.stringify(books));
  }

  // ─── ISBN scanning ───
  function addISBN(isbn) {
    for (var i = 0; i < books.length; i++) {
      if (books[i].type === 'isbn' && books[i].isbn === isbn) {
        lastScanEl.textContent = '⚠️ Already scanned: ' + isbn;
        return;
      }
    }
    books.push({ type: 'isbn', isbn: isbn });
    lastScanEl.textContent = '✅ ' + isbn;
    document.body.classList.add('flash');
    setTimeout(function() { document.body.classList.remove('flash'); }, 300);
    if (navigator.vibrate) navigator.vibrate(100);
    updateUI();
  }

  window._addManualISBN = function() {
    var input = document.getElementById('manual-isbn');
    var isbn = input.value.trim().replace(/[^0-9X]/gi, '');
    if (isbn.length === 10 || isbn.length === 13) {
      addISBN(isbn);
      input.value = '';
    } else {
      lastScanEl.textContent = '⚠️ ISBN must be 10 or 13 digits';
    }
  };

  // ─── Manual book entry ───
  window._takeCoverPhoto = function() {
    document.getElementById('cover-input').click();
  };

  document.getElementById('cover-input').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      // Show crop UI instead of directly setting cover
      var rawURL = ev.target.result;
      var cropContainer = document.getElementById('crop-container');
      var cropImg = document.getElementById('crop-img');
      var cropOverlay = document.getElementById('crop-overlay');
      cropImg.src = rawURL;
      cropContainer.style.display = 'block';
      document.getElementById('cover-preview').style.display = 'none';

      // Wait for image to load, then set default crop area
      cropImg.onload = function() {
        var w = cropImg.clientWidth;
        var h = cropImg.clientHeight;
        // Default crop: centered, book-ish proportions
        // Default crop: centered, 70% of image, book proportions (2:3)
        var cropH = h * 0.85;
        var cropW = cropH * 0.67;
        if (cropW > w * 0.9) { cropW = w * 0.9; cropH = cropW / 0.67; }
        var left = (w - cropW) / 2;
        var top = (h - cropH) / 2;
        cropOverlay.style.left = left + 'px';
        cropOverlay.style.top = top + 'px';
        cropOverlay.style.width = cropW + 'px';
        cropOverlay.style.height = cropH + 'px';

        // Add resize handle
        cropOverlay.innerHTML = '<div class="crop-handle" id="crop-handle"></div>';
        var handle = document.getElementById('crop-handle');

        // Drag to move crop area (on the overlay itself)
        var dragging = false, resizing = false, startX, startY, origLeft, origTop, origW, origH;
        cropOverlay.onpointerdown = function(ev2) {
          if (ev2.target === handle) return; // handled separately
          dragging = true;
          startX = ev2.clientX; startY = ev2.clientY;
          origLeft = parseFloat(cropOverlay.style.left);
          origTop = parseFloat(cropOverlay.style.top);
          cropOverlay.setPointerCapture(ev2.pointerId);
        };
        cropOverlay.onpointermove = function(ev2) {
          if (!dragging) return;
          var dx = ev2.clientX - startX;
          var dy = ev2.clientY - startY;
          var newLeft = Math.max(0, Math.min(w - parseFloat(cropOverlay.style.width), origLeft + dx));
          var newTop = Math.max(0, Math.min(h - parseFloat(cropOverlay.style.height), origTop + dy));
          cropOverlay.style.left = newLeft + 'px';
          cropOverlay.style.top = newTop + 'px';
        };
        cropOverlay.onpointerup = function() { dragging = false; resizing = false; };

        // Resize handle
        handle.onpointerdown = function(ev3) {
          ev3.stopPropagation();
          resizing = true;
          startX = ev3.clientX; startY = ev3.clientY;
          origW = parseFloat(cropOverlay.style.width);
          origH = parseFloat(cropOverlay.style.height);
          origLeft = parseFloat(cropOverlay.style.left);
          origTop = parseFloat(cropOverlay.style.top);
          handle.setPointerCapture(ev3.pointerId);
        };
        handle.onpointermove = function(ev3) {
          if (!resizing) return;
          var dx = ev3.clientX - startX;
          var dy = ev3.clientY - startY;
          var newW = Math.max(40, Math.min(w - origLeft, origW + dx));
          var newH = Math.max(40, Math.min(h - origTop, origH + dy));
          cropOverlay.style.width = newW + 'px';
          cropOverlay.style.height = newH + 'px';
        };
        handle.onpointerup = function() { resizing = false; };
      };
    };
    reader.readAsDataURL(file);
  });

  // ─── Loose cover photo (no book association) ───
  var looseMode = false;
  window._takeLooseCover = function() {
    looseMode = true;
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.capture = 'environment';
    input.onchange = function(e) {
      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(ev) {
        // Show crop UI (same as regular cover)
        var rawURL = ev.target.result;
        var cropContainer = document.getElementById('crop-container');
        var cropImg = document.getElementById('crop-img');
        cropImg.src = rawURL;
        cropContainer.style.display = 'block';
        document.getElementById('cover-preview').style.display = 'none';
      };
      reader.readAsDataURL(file);
    };
    input.click();
  };

  window._cropConfirm = function() {
    var cropImg = document.getElementById('crop-img');
    var cropOverlay = document.getElementById('crop-overlay');
    // Calculate crop in image coordinates
    var scaleX = cropImg.naturalWidth / cropImg.clientWidth;
    var scaleY = cropImg.naturalHeight / cropImg.clientHeight;
    var sx = parseFloat(cropOverlay.style.left) * scaleX;
    var sy = parseFloat(cropOverlay.style.top) * scaleY;
    var sw = parseFloat(cropOverlay.style.width) * scaleX;
    var sh = parseFloat(cropOverlay.style.height) * scaleY;
    // Draw cropped area to canvas
    var canvas = document.createElement('canvas');
    canvas.width = sw; canvas.height = sh;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(cropImg, sx, sy, sw, sh, 0, 0, sw, sh);
    var croppedURL = canvas.toDataURL('image/jpeg', 0.85);
    document.getElementById('crop-container').style.display = 'none';

    if (looseMode) {
      // Save as unassigned cover
      var covers = JSON.parse(storageGet('looseCovers') || '[]');
      covers.push({ cover: croppedURL, timestamp: Date.now() });
      storageSet('looseCovers', JSON.stringify(covers));
      var statusEl = document.getElementById('manual-status');
      if (statusEl) statusEl.textContent = '📷 Cover saved (' + covers.length + ' unassigned)';
      document.getElementById('cover-preview').style.display = 'flex';
      looseMode = false;
    } else {
      // Regular cover for manual book entry
      coverDataURL = croppedURL;
      document.getElementById('cover-preview').innerHTML = '<img src="' + coverDataURL + '" alt="Cover">';
      document.getElementById('cover-preview').style.display = 'flex';
    }
  };

  window._cropCancel = function() {
    document.getElementById('crop-container').style.display = 'none';
    document.getElementById('cover-preview').style.display = 'flex';
    coverDataURL = '';
    looseMode = false;
  };

  window._addManualBook = function() {
    var title = document.getElementById('m-title').value.trim();
    var author = document.getElementById('m-author').value.trim();
    var manualStatus = document.getElementById('manual-status');

    if (!title) { manualStatus.textContent = '⚠️ Title is required'; return; }
    if (!author) { manualStatus.textContent = '⚠️ Author is required'; return; }

    // Check duplicate
    for (var i = 0; i < books.length; i++) {
      if (books[i].type === 'manual' && books[i].title.toLowerCase() === title.toLowerCase()) {
        manualStatus.textContent = '⚠️ Already added: ' + title;
        return;
      }
    }

    books.push({
      type: 'manual',
      title: title,
      author: author,
      cover: coverDataURL
    });

    // Reset form
    document.getElementById('m-title').value = '';
    document.getElementById('m-author').value = '';
    document.getElementById('cover-preview').innerHTML = '<span class="placeholder">📷</span>';
    coverDataURL = '';
    manualStatus.textContent = '✅ Added: ' + title;
    if (navigator.vibrate) navigator.vibrate(100);
    updateUI();
  };

  // ─── Remove / Clear ───
  window._clearAll = function() {
    if (confirm('Clear all ' + books.length + ' books?')) {
      books = [];
      updateUI();
      lastScanEl.textContent = '';
    }
  };

  // ─── Export ───
  // Export format: JSON lines
  // ISBNs go as plain text lines; manual entries as JSON objects
  function buildExportData() {
    var lines = [];
    var manualEntries = [];
    for (var i = 0; i < books.length; i++) {
      if (books[i].type === 'isbn') {
        lines.push(books[i].isbn);
      } else {
        manualEntries.push(books[i]);
      }
    }
    // ISBNs file content
    var isbnText = lines.join('\n') + (lines.length ? '\n' : '');
    // Manual entries as JSON
    var manualJSON = manualEntries.length ? JSON.stringify(manualEntries, null, 2) : '';
    return { isbnText: isbnText, manualJSON: manualJSON, hasISBNs: lines.length > 0, hasManual: manualEntries.length > 0 };
  }

  window._exportData = function(mode) {
    if (books.length === 0) return;
    var data = buildExportData();
    var statusEl = document.getElementById('last-scan') || document.getElementById('manual-status');

    if (mode === 'copy') {
      var text = '';
      if (data.hasISBNs) text += data.isbnText;
      if (data.hasManual) text += (text ? '\n' : '') + data.manualJSON;
      navigator.clipboard.writeText(text)
        .then(function() { if(statusEl) statusEl.textContent = '📋 Copied!'; })
        .catch(function() { if(statusEl) statusEl.textContent = '❌ Copy failed'; });

    } else if (mode === 'share') {
      // Upload to Dropbox
      if (data.hasISBNs) {
        uploadToDropbox('isbns.txt', data.isbnText);
      }
      if (data.hasManual) {
        uploadToDropbox('manual_books.json', data.manualJSON);
      }
      // Upload loose covers
      var looseCovers = JSON.parse(storageGet('looseCovers') || '[]');
      if (looseCovers.length > 0) {
        uploadToDropbox('loose_covers.json', JSON.stringify(looseCovers, null, 2));
      }
    }
  };

  // ─── Settings ───
  var DBX_APP_KEY = 'skoesnt62y7joky';
  var DBX_REDIRECT = window.location.origin + window.location.pathname;

  window._showSettings = function() {
    var panel = document.getElementById('settings-panel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    var status = document.getElementById('dbx-status');
    status.textContent = storageGet('dbxRefreshToken') ? '✅ Dropbox connected' : '⚠️ Not connected';
  };
  window._hideSettings = function() {
    document.getElementById('settings-panel').style.display = 'none';
  };
  window._disconnectDropbox = function() {
    storageSet('dbxRefreshToken', '');
    storageSet('dbxAccessToken', '');
    storageSet('dbxTokenExpiry', '');
    document.getElementById('dbx-status').textContent = '⚠️ Disconnected';
  };

  // ─── OAuth PKCE Flow ───
  function generateCodeVerifier() {
    var arr = new Uint8Array(32);
    crypto.getRandomValues(arr);
    return btoa(String.fromCharCode.apply(null, arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  }
  function sha256(plain) {
    var encoder = new TextEncoder();
    return crypto.subtle.digest('SHA-256', encoder.encode(plain));
  }
  function base64urlencode(buf) {
    var str = '';
    var bytes = new Uint8Array(buf);
    for (var i = 0; i < bytes.length; i++) str += String.fromCharCode(bytes[i]);
    return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  }

  window._authorizeDropbox = function() {
    var verifier = generateCodeVerifier();
    storageSet('dbxCodeVerifier', verifier);
    sha256(verifier).then(function(hash) {
      var challenge = base64urlencode(hash);
      var url = 'https://www.dropbox.com/oauth2/authorize' +
        '?client_id=' + DBX_APP_KEY +
        '&response_type=code' +
        '&code_challenge=' + challenge +
        '&code_challenge_method=S256' +
        '&redirect_uri=' + encodeURIComponent(DBX_REDIRECT) +
        '&token_access_type=offline';
      window.location.href = url;
    });
  };

  // Handle OAuth redirect (code in URL params)
  function handleOAuthRedirect() {
    var params = new URLSearchParams(window.location.search);
    var code = params.get('code');
    if (!code) return;
    var verifier = storageGet('dbxCodeVerifier');
    if (!verifier) return;
    // Exchange code for tokens
    fetch('https://api.dropboxapi.com/oauth2/token', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: 'code=' + code + '&grant_type=authorization_code' +
        '&client_id=' + DBX_APP_KEY +
        '&redirect_uri=' + encodeURIComponent(DBX_REDIRECT) +
        '&code_verifier=' + verifier
    }).then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.refresh_token) {
        storageSet('dbxRefreshToken', data.refresh_token);
        storageSet('dbxAccessToken', data.access_token);
        storageSet('dbxTokenExpiry', String(Date.now() + (data.expires_in * 1000)));
        storageSet('dbxCodeVerifier', '');
      }
      // Clean URL
      window.history.replaceState({}, '', DBX_REDIRECT);
    });
  }
  handleOAuthRedirect();

  // ─── Dropbox Upload (with auto-refresh) ───
  function getAccessToken(callback) {
    var expiry = parseInt(storageGet('dbxTokenExpiry') || '0');
    if (Date.now() < expiry - 60000) {
      callback(storageGet('dbxAccessToken'));
      return;
    }
    var refreshToken = storageGet('dbxRefreshToken');
    if (!refreshToken) { callback(null); return; }
    fetch('https://api.dropboxapi.com/oauth2/token', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: 'grant_type=refresh_token&refresh_token=' + refreshToken + '&client_id=' + DBX_APP_KEY
    }).then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.access_token) {
        storageSet('dbxAccessToken', data.access_token);
        storageSet('dbxTokenExpiry', String(Date.now() + (data.expires_in * 1000)));
        callback(data.access_token);
      } else { callback(null); }
    }).catch(function() { callback(null); });
  };

  function uploadToDropbox(filename, content) {
    var statusEl = document.getElementById('last-scan') || document.getElementById('manual-status');
    if (statusEl) statusEl.textContent = '⏳ Syncing...';
    getAccessToken(function(token) {
      if (!token) {
        if (statusEl) statusEl.textContent = '⚠️ Tap ⚙️ to authorize Dropbox';
        return;
      }
      fetch('https://content.dropboxapi.com/2/files/upload', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Dropbox-API-Arg': JSON.stringify({ path: '/' + filename, mode: 'overwrite', autorename: false, mute: false }),
          'Content-Type': 'application/octet-stream'
        },
        body: content
      }).then(function(resp) {
        if (resp.ok) { if (statusEl) statusEl.textContent = '✅ Saved to Dropbox!'; }
        else { resp.text().then(function(t) { try { if(statusEl) statusEl.textContent = '❌ ' + JSON.parse(t).error_summary; } catch(e) { if(statusEl) statusEl.textContent = '❌ Upload failed'; } }); }
      }).catch(function(err) { if (statusEl) statusEl.textContent = '❌ ' + err.message; });
    });
  }

  function downloadFile(content, filename, mimeType) {
    var blob = new Blob([content], { type: mimeType });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ─── Enter key handlers ───
  document.getElementById('manual-isbn').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') window._addManualISBN();
  });
  document.getElementById('m-title').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('m-author').focus();
  });
  document.getElementById('m-author').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') window._addManualBook();
  });

  // ─── Barcode scanner ───
  async function startScanning() {
    if (!('BarcodeDetector' in window)) {
      errorEl.textContent = 'BarcodeDetector API not supported in this browser. Try Chrome on Android.';
      statusEl.textContent = 'Camera-based scanning unavailable — use manual entry below.';
      return;
    }

    var detector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128', 'code_39'] });

    try {
      var stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      video.srcObject = stream;
      statusEl.textContent = 'Point camera at a book barcode';
    } catch (err) {
      errorEl.textContent = 'Camera access denied: ' + err.message;
      statusEl.textContent = 'Use manual entry below';
      return;
    }

    async function detect() {
      if (!scanning) { requestAnimationFrame(detect); return; }
      var now = Date.now();
      if (now - lastScanTime < 1500) { requestAnimationFrame(detect); return; }

      try {
        var barcodes = await detector.detect(video);
        for (var i = 0; i < barcodes.length; i++) {
          var code = barcodes[i].rawValue;
          if (!code) continue;
          var isbn = '';
          // EAN-13 book barcodes (978/979 prefix)
          if (code.length === 13 && (code.startsWith('978') || code.startsWith('979'))) {
            isbn = code;
          // UPC-A: 12 digits — some US mass-market paperbacks used these
          } else if (code.length === 12) {
            isbn = code;
          // ISBN-10 (10 digits, sometimes encoded in Code 39/128 on older books)
          } else if (code.length === 10) {
            isbn = code;
          // EAN-8: rare, but some booklets/pamphlets
          } else if (code.length === 8) {
            isbn = code;
          }
          if (isbn) {
            lastScanTime = now;
            addISBN(isbn);
            break;
          }
        }
      } catch (e) {}
      requestAnimationFrame(detect);
    }

    video.addEventListener('loadedmetadata', function() { detect(); });
  }

  updateUI();
  startScanning();

  // Register service worker for PWA / offline
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function() {});
  }

})();
</script>
