<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Book Scanner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e;
  color: #eee;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  padding: 12px 16px;
  background: #16213e;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
header h1 { font-size: 1.2rem; }
#count { 
  background: #0f3460;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 0.9rem;
}
#camera-container {
  position: relative;
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  aspect-ratio: 4/3;
  background: #000;
  overflow: hidden;
}
video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
#scan-line {
  position: absolute;
  top: 50%;
  left: 10%;
  right: 10%;
  height: 2px;
  background: #e94560;
  box-shadow: 0 0 8px #e94560;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
#status {
  text-align: center;
  padding: 8px;
  font-size: 0.85rem;
  color: #aaa;
}
#last-scan {
  text-align: center;
  padding: 8px 16px;
  font-size: 1.1rem;
  color: #4ecca3;
  min-height: 2.5em;
}
#isbn-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 16px;
  max-height: 30vh;
}
.isbn-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  margin-bottom: 4px;
  background: #16213e;
  border-radius: 6px;
  font-family: monospace;
  font-size: 0.95rem;
}
.isbn-item .remove {
  background: none;
  border: none;
  color: #e94560;
  font-size: 1.2rem;
  cursor: pointer;
  padding: 0 4px;
}
#actions {
  padding: 12px 16px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
button {
  flex: 1;
  min-width: 80px;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
}
#copy-btn { background: #4ecca3; color: #1a1a2e; }
#clear-btn { background: #e94560; color: #fff; }
#share-btn { background: #0f3460; color: #eee; }
#download-btn { background: #7b68ee; color: #fff; }
.flash {
  animation: flashGreen 0.3s;
}
@keyframes flashGreen {
  0% { background: #4ecca3; } 100% { background: #1a1a2e; }
}
#error {
  padding: 16px;
  text-align: center;
  color: #e94560;
}
#manual-entry {
  padding: 8px 16px;
  display: flex;
  gap: 8px;
}
#manual-entry input {
  flex: 1;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #0f3460;
  background: #16213e;
  color: #eee;
  font-size: 1rem;
  font-family: monospace;
}
#manual-entry button {
  flex: 0;
  padding: 10px 16px;
  background: #0f3460;
  color: #eee;
}
</style>
</head>
<body>

<header>
  <h1>📚 Book Scanner</h1>
  <span id="count">0 books</span>
</header>

<div id="camera-container">
  <video id="video" autoplay playsinline></video>
  <div id="scan-line"></div>
</div>

<div id="status">Initializing camera...</div>
<div id="last-scan"></div>

<div id="manual-entry">
  <input type="text" id="manual-isbn" placeholder="Type ISBN manually" inputmode="numeric">
  <button onclick="window._addManualISBN()">Add</button>
</div>

<div id="isbn-list"></div>

<div id="actions">
  <button id="copy-btn" onclick="window._copyISBNs()">📋 Copy</button>
  <button id="share-btn" onclick="window._shareISBNs()">📤 Share</button>
  <button id="download-btn" onclick="window._downloadISBNs()">💾 Save</button>
  <button id="clear-btn" onclick="window._clearAll()">🗑️ Clear</button>
</div>

<div id="error"></div>

<script>
(function() {
  // Storage helpers
  function storageGet(key) {
    try { return localStorage.getItem(key); } catch(e) { return null; }
  }
  function storageSet(key, val) {
    try { localStorage.setItem(key, val); } catch(e) {}
  }

  var scannedISBNs = JSON.parse(storageGet('scannedISBNs') || '[]');
  var scanning = true;
  var lastScanTime = 0;

  var video = document.getElementById('video');
  var statusEl = document.getElementById('status');
  var lastScanEl = document.getElementById('last-scan');
  var listEl = document.getElementById('isbn-list');
  var countEl = document.getElementById('count');
  var errorEl = document.getElementById('error');

  function updateUI() {
    countEl.textContent = scannedISBNs.length + ' book' + (scannedISBNs.length !== 1 ? 's' : '');
    listEl.innerHTML = scannedISBNs.map(function(isbn, i) {
      return '<div class="isbn-item"><span>' + isbn + '</span>' +
        '<button class="remove" onclick="window._removeISBN(' + i + ')">×</button></div>';
    }).reverse().join('');
    storageSet('scannedISBNs', JSON.stringify(scannedISBNs));
  }

  function addISBN(isbn) {
    if (scannedISBNs.indexOf(isbn) !== -1) {
      lastScanEl.textContent = '⚠️ Already scanned: ' + isbn;
      return;
    }
    scannedISBNs.push(isbn);
    lastScanEl.textContent = '✅ ' + isbn;
    document.body.classList.add('flash');
    setTimeout(function() { document.body.classList.remove('flash'); }, 300);
    if (navigator.vibrate) navigator.vibrate(100);
    updateUI();
  }

  window._removeISBN = function(index) {
    scannedISBNs.splice(index, 1);
    updateUI();
  };

  window._addManualISBN = function() {
    var input = document.getElementById('manual-isbn');
    var isbn = input.value.trim().replace(/[^0-9X]/gi, '');
    if (isbn.length === 10 || isbn.length === 13) {
      addISBN(isbn);
      input.value = '';
    } else {
      lastScanEl.textContent = '⚠️ ISBN must be 10 or 13 digits';
    }
  };

  window._copyISBNs = function() {
    if (scannedISBNs.length === 0) return;
    navigator.clipboard.writeText(scannedISBNs.join('\n'))
      .then(function() { lastScanEl.textContent = '📋 Copied to clipboard!'; })
      .catch(function() { lastScanEl.textContent = '❌ Copy failed'; });
  };

  window._shareISBNs = function() {
    if (scannedISBNs.length === 0) return;
    var text = scannedISBNs.join('\n');
    if (navigator.share) {
      navigator.share({ title: 'Scanned ISBNs', text: text }).catch(function() {});
    } else {
      window._copyISBNs();
    }
  };

  window._downloadISBNs = function() {
    if (scannedISBNs.length === 0) return;
    var text = scannedISBNs.join('\n') + '\n';
    var blob = new Blob([text], { type: 'text/plain' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'isbns.txt';
    a.click();
    URL.revokeObjectURL(url);
    lastScanEl.textContent = '💾 Saved isbns.txt to Downloads';
  };

  window._clearAll = function() {
    if (confirm('Clear all ' + scannedISBNs.length + ' scanned ISBNs?')) {
      scannedISBNs = [];
      updateUI();
      lastScanEl.textContent = '';
    }
  };

  // Handle Enter key on manual input
  document.getElementById('manual-isbn').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') window._addManualISBN();
  });

  async function startScanning() {
    if (!('BarcodeDetector' in window)) {
      errorEl.textContent = 'BarcodeDetector API not supported in this browser. Try Chrome on Android.';
      statusEl.textContent = 'Camera-based scanning unavailable — use manual entry below.';
      return;
    }

    var detector = new BarcodeDetector({ formats: ['ean_13', 'ean_8'] });

    try {
      var stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      video.srcObject = stream;
      statusEl.textContent = 'Point camera at a book barcode';
    } catch (err) {
      errorEl.textContent = 'Camera access denied: ' + err.message;
      statusEl.textContent = 'Use manual entry below';
      return;
    }

    async function detect() {
      if (!scanning) { requestAnimationFrame(detect); return; }
      var now = Date.now();
      if (now - lastScanTime < 1500) { requestAnimationFrame(detect); return; }

      try {
        var barcodes = await detector.detect(video);
        for (var i = 0; i < barcodes.length; i++) {
          var code = barcodes[i].rawValue;
          if (code && (code.startsWith('978') || code.startsWith('979') || code.length === 10)) {
            lastScanTime = now;
            addISBN(code);
            break;
          }
        }
      } catch (e) {}
      requestAnimationFrame(detect);
    }

    video.addEventListener('loadedmetadata', function() { detect(); });
  }

  updateUI();
  startScanning();

  // Register service worker for PWA / offline
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function() {});
  }

})();
</script>
</body>
</html>
