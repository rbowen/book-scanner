<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<title>Books.rcbowen.com</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Georgia', serif;
    background: #f5f1eb;
    color: #2c2c2c;
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px;
}
h1 { font-size: 1.8rem; margin-bottom: 4px; color: #1a1a1a; }
.subtitle { color: #666; margin-bottom: 16px; font-size: 0.9rem; }

/* Controls */
.controls {
    position: sticky;
    top: 0;
    background: #f5f1eb;
    padding: 12px 0;
    z-index: 100;
    border-bottom: 1px solid #ddd;
    margin-bottom: 16px;
}
.search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
}
#search {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 1rem;
    font-family: inherit;
}
.sort-btns button {
    padding: 6px 14px;
    border: 1px solid #ccc;
    background: #fff;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85rem;
}
.sort-btns button.active {
    background: #2c2c2c;
    color: #fff;
    border-color: #2c2c2c;
}

/* Alpha nav */
.alpha-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    margin-bottom: 12px;
}
.alpha-nav a {
    padding: 4px 8px;
    font-size: 0.8rem;
    text-decoration: none;
    color: #555;
    background: #e8e0d4;
    border-radius: 3px;
    font-weight: 600;
}
.alpha-nav a:hover { background: #2c2c2c; color: #fff; }
.alpha-nav a.disabled { opacity: 0.3; pointer-events: none; }

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
}
.card {
    cursor: pointer;
    text-align: center;
    transition: transform 0.15s;
}
.card:hover { transform: translateY(-3px); }
.card img {
    width: 100px;
    height: 140px;
    object-fit: cover;
    border-radius: 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
.card .no-cover {
    width: 100px;
    height: 140px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #e8e0d4;
    border-radius: 4px;
    font-size: 1.5rem;
}
.card .card-title {
    font-size: 0.8rem;
    margin-top: 6px;
    font-weight: 600;
    line-height: 1.2;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
.card .card-author {
    font-size: 0.75rem;
    color: #666;
    font-style: italic;
}

/* Letter header */
.letter-header {
    grid-column: 1 / -1;
    font-size: 1.4rem;
    font-weight: bold;
    color: #1a1a1a;
    border-bottom: 2px solid #2c2c2c;
    padding: 8px 0 4px;
    margin-top: 12px;
}

/* Modal */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 24px;
}
.modal-overlay.open { display: flex; }
.modal {
    background: #fff;
    border-radius: 12px;
    max-width: 500px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px;
    position: relative;
}
.modal-close {
    position: absolute;
    top: 12px;
    right: 16px;
    font-size: 1.5rem;
    cursor: pointer;
    background: none;
    border: none;
    color: #999;
}
.modal-cover {
    text-align: center;
    margin-bottom: 16px;
}
.modal-cover img {
    max-height: 200px;
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.modal h2 { font-size: 1.3rem; margin-bottom: 4px; }
.modal .m-author { font-style: italic; color: #555; margin-bottom: 12px; }
.modal .m-meta { font-size: 0.85rem; color: #666; line-height: 1.8; }
.modal .m-meta span { display: block; }
.modal .m-link {
    display: inline-block;
    margin-top: 12px;
    padding: 8px 16px;
    background: #2c2c2c;
    color: #fff;
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.85rem;
}
.modal .m-link:hover { background: #444; }
.modal .m-edit-cover {
    display: inline-block;
    margin-top: 8px;
    margin-left: 8px;
    padding: 8px 16px;
    background: #7b68ee;
    color: #fff;
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.85rem;
    cursor: pointer;
    border: none;
}
#no-results {
    display: none;
    text-align: center;
    padding: 40px;
    color: #999;
    font-size: 1.1rem;
    grid-column: 1 / -1;
}
</style>
</head>
<body>

<h1>Books.rcbowen.com</h1>
<p class="subtitle"><span id="book-count">22</span> books</p>

<div class="controls">
    <div class="search-row">
        <input type="text" id="search" placeholder="Search by title or author..." autocomplete="off">
        <div class="sort-btns">
            <button id="sort-author" class="active" onclick="setSort('author')">Author</button>
            <button id="sort-title" onclick="setSort('title')">Title</button>
        </div>
    </div>
    <div class="alpha-nav" id="alpha-nav"></div>
</div>

<div class="grid" id="grid"></div>
<div id="no-results">No books match your search.</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" id="modal"></div>
</div>

<script>
var BOOKS = [{"id": 0, "title": "Dandelion Wine", "authors": ["Ray Bradbury"], "publishers": ["Bantam Books"], "year": "1990", "pages": 239, "subjects": ["Fiction", "Boys", "City and town life", "Translations into Russian", "Science fiction, American"], "isbn": "9780553277531", "cover": "covers/9780553277531.jpg", "source_url": "https://openlibrary.org/isbn/9780553277531"}, {"id": 1, "title": "The Definitive Guide To Apache", "authors": ["Ben Laurie", "Peter Laurie"], "publishers": ["O'Reilly"], "year": "2003", "pages": 568, "subjects": ["Apache (Computer file : Apache Group)", "Web servers", "Computer programs", "Client/server", "Internet"], "isbn": "9780596002039", "cover": "covers/9780596002039.jpg", "source_url": "https://openlibrary.org/isbn/9780596002039"}, {"id": 2, "title": "The Definitive Guide to Apache mod_rewrite (Definitive Guide)", "authors": ["Rich Bowen"], "publishers": ["Apress"], "year": "February 8, 2006", "pages": 200, "subjects": ["Computer networks", "Web servers", "Computer programs", "Web site development", "Computer network resources"], "isbn": "9781590595619", "cover": "covers/9781590595619.jpg", "source_url": "https://openlibrary.org/isbn/9781590595619"}, {"id": 3, "title": "\u3060\u308c\u3067\u3082\u30ab\u30f3\u30bf\u30f3CGI&SSI \u30b5\u30f3\u30d7\u30eb\u96c6", "authors": ["\u53e4\u5ddd\u525b", "\u8c37\u4e2d\u4e00\u671d", "\u6210\u7530\u653f\u53f8"], "publishers": ["\u79c0\u548c\u30b7\u30b9\u30c6\u30e0"], "year": "1998-03-20", "pages": "", "subjects": [], "isbn": "9784879667748", "cover": "covers/ISBN_9784879667748_-_\u3060\u308c\u3067\u3082\u30ab\u30f3\u30bf\u30f3C.jpg", "source_url": "https://isbnsearch.org/isbn/9784879667748"}, {"id": 4, "title": "CGI Programming with Perl, Visual Basic, and C", "authors": ["Richard Boweh", "Kevin O'Brien"], "publishers": ["Sams Publishing"], "year": "April 29, 1997", "pages": "", "subjects": [], "isbn": "9781575212418", "cover": "", "source_url": "https://openlibrary.org/isbn/9781575212418"}, {"id": 5, "title": "Apache Administrator's Handbook", "authors": ["Rich Bowen", "Daniel Lopez Ridruejo", "Allan Liska"], "publishers": ["Sams"], "year": "March 12, 2002", "pages": 448, "subjects": ["Apache (Computer file : Apache Group)", "Web servers", "Computer programs", "Apache (computer program)"], "isbn": "9780672322747", "cover": "covers/9780672322747.jpg", "source_url": "https://openlibrary.org/isbn/9780672322747"}, {"id": 6, "title": "Apache cookbook", "authors": ["Ken Coar", "Rich Bowen"], "publishers": ["O'Reilly"], "year": "2004", "pages": 234, "subjects": ["Computer networks", "Computer programs", "Web servers", "Apache (Computer file : Apache Group)", "Security measures"], "isbn": "9780596001919", "cover": "covers/9780596001919.jpg", "source_url": "https://openlibrary.org/isbn/9780596001919"}, {"id": 7, "title": "Webmaster in a nutshell", "authors": ["Stephen Spainhour", "Inc., O'Reilly Media"], "publishers": ["O'Reilly"], "year": "1996", "pages": 356, "subjects": ["Design", "Document markup languages", "HTML (Document markup language)", "Handbooks, manuals", "Handbooks, manuals, etc"], "isbn": "9781565922297", "cover": "covers/9781565922297.jpg", "source_url": "https://openlibrary.org/isbn/9781565922297"}, {"id": 8, "title": "S is for space", "authors": ["Ray Bradbury"], "publishers": [], "year": "", "pages": "", "subjects": [], "isbn": "", "cover": "covers/S_is_for_space.jpg", "source_url": ""}, {"id": 9, "title": "R Is for Rocket", "authors": ["Ray Bradbury"], "publishers": ["Bantam"], "year": "Jun 22, 1962", "pages": "", "subjects": [], "isbn": "0553143034", "cover": "covers/0553143034.jpg", "source_url": "https://openlibrary.org/isbn/0553143034"}, {"id": 10, "title": "The ice dragon", "authors": ["George R. R. Martin"], "publishers": ["Tor Teen"], "year": "2014", "pages": 120, "subjects": ["Fantasy", "Juvenile fiction", "Dragons", "Fantasy fiction", "Fiction"], "isbn": "9780765378774", "cover": "covers/9780765378774.jpg", "source_url": "https://openlibrary.org/isbn/9780765378774"}, {"id": 11, "title": "My Effin' Life", "authors": ["Geddy Lee"], "publishers": ["Harper"], "year": "2023-11-14", "pages": 512, "subjects": ["Autobiography", "Rush", "Music", "Bass guitar"], "isbn": "9780063159419", "cover": "covers/9780063159419.jpg", "source_url": "https://openlibrary.org/isbn/9780063159419"}, {"id": 12, "title": "The Apache modules book", "authors": ["Nick Kew"], "publishers": ["Pearson Education"], "year": "2007", "pages": 558, "subjects": ["Apache (Computer file : Apache Group)", "Application software", "Computer programs", "Development", "Web servers"], "isbn": "9780132409674", "cover": "covers/9780132409674.jpg", "source_url": "https://openlibrary.org/isbn/9780132409674"}, {"id": 13, "title": "Maximum Apache Security", "authors": ["Anonymous"], "publishers": ["Sams"], "year": "June 15, 2002", "pages": 500, "subjects": ["Computer Technology", "Nonfiction", "Apache (Computer file : Apache Group)", "Web sites", "Security measures"], "isbn": "9780672323805", "cover": "covers/9780672323805.jpg", "source_url": "https://openlibrary.org/isbn/9780672323805"}, {"id": 14, "title": "Apache server unleashed", "authors": ["Rich Bowen", "Richard Bowen", "Matthew Marlowe", "Ken Coar", "Patrik Grip-Jansson", "Mohan Chinnappan"], "publishers": ["Sams"], "year": "2000", "pages": 628, "subjects": ["Apache (Computer file : Apache Group)", "Web servers", "Apache Server (Computer file)", "Computer programs", "Internet"], "isbn": "9780672318085", "cover": "covers/9780672318085.jpg", "source_url": "https://openlibrary.org/isbn/9780672318085"}, {"id": 15, "title": "The Internet roadmap", "authors": ["Bennett Falk"], "publishers": ["Sybex"], "year": "1994", "pages": 325, "subjects": ["Handbooks, manuals", "Handbooks, manuals, etc", "Internet", "Internet (Computer network)", "Internet, handbooks, manuals, etc."], "isbn": "9780782115864", "cover": "covers/9780782115864.jpg", "source_url": "https://openlibrary.org/isbn/9780782115864"}, {"id": 16, "title": "Apache Desktop Reference", "authors": ["Ralf S. Engelschall"], "publishers": ["Pearson Education"], "year": "December 15, 2000", "pages": 208, "subjects": ["Apache (Computer file : Apache Group)", "Web servers", "Computer programs", "Apache (computer program)"], "isbn": "9780201604702", "cover": "covers/9780201604702.jpg", "source_url": "https://openlibrary.org/isbn/9780201604702"}, {"id": 17, "title": "Minecraft modding with Forge", "authors": ["Arun Gupta"], "publishers": ["O'Reilly Media"], "year": "2015", "pages": 174, "subjects": ["Java (Computer program language)", "Computer games", "Programming", "Minecraft (Game)", "Computer games, programming"], "isbn": "9781491918890", "cover": "", "source_url": "https://openlibrary.org/isbn/9781491918890"}, {"id": 18, "title": "Open sources", "authors": ["Chris DiBona", "Sam Ockman", "Mark Stone", "Brian Behlendorf", "Scott Bradner", "Jim Hamerly", "Kirk McKusick", "Tim O'Reilly", "Tom Paquin", "Bruce Perens", "Eric S. Raymond", "Richard Stallman", "Michael Tiemann", "Linus Torvalds", "Paul Vixie", "Larry Wall", "Bob Young"], "publishers": ["O'Reilly"], "year": "1999", "pages": 272, "subjects": ["Open source software", "Linux", "Linux (computer operating system)", "Free computer software", "Software engineering"], "isbn": "9781565925823", "cover": "covers/9781565925823.jpg", "source_url": "https://openlibrary.org/isbn/9781565925823"}, {"id": 19, "title": "Dungeon Crawler Carl", "authors": ["Matt Dinniman"], "publishers": ["Ace"], "year": "2020", "pages": "", "subjects": ["Lit RPG", "Fantasy"], "isbn": "9780593820254", "cover": "covers/Dungeon_Crawler_Carl.jpg", "source_url": "https://openlibrary.org/isbn/9780593820254"}, {"id": 20, "title": "The little red hen", "authors": ["J. P. Miller"], "publishers": ["Golden Books Pub. Co.", "Golden Books"], "year": "2001", "pages": "", "subjects": ["Folklore", "Folklore, juvenile literature"], "isbn": "9780307960306", "cover": "covers/9780307960306.jpg", "source_url": "https://openlibrary.org/isbn/9780307960306"}, {"id": 21, "title": "- Spidering Hacks By Kevin Hemenway; Tara Calishain", "authors": [], "publishers": ["O'reilly, Incorporated"], "year": "", "pages": "", "subjects": ["Media > Books"], "isbn": "636920005773", "cover": "covers/636920005773.jpg", "source_url": ""}];
var currentSort = 'author';
var currentSearch = '';
var editingBookId = null;

function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sortKey(book, mode) {
    if (mode === 'author') {
        var a = book.authors[0] || '';
        var parts = a.split(' ');
        return (parts[parts.length - 1] + ' ' + book.title).toLowerCase();
    }
    return book.title.toLowerCase();
}

function getFirstLetter(book, mode) {
    if (mode === 'author') {
        var a = book.authors[0] || '';
        var parts = a.split(' ');
        var last = parts[parts.length - 1] || '?';
        return last[0].toUpperCase();
    }
    var t = book.title.replace(/^(the|a|an)\s+/i, '');
    return (t[0] || '?').toUpperCase();
}

function render() {
    var filtered = BOOKS.filter(function(b) {
        if (!currentSearch) return true;
        var q = currentSearch.toLowerCase();
        return b.title.toLowerCase().indexOf(q) !== -1 ||
               b.authors.join(' ').toLowerCase().indexOf(q) !== -1;
    });

    filtered.sort(function(a, b) {
        return sortKey(a, currentSort).localeCompare(sortKey(b, currentSort));
    });

    // Build alpha nav
    var letters = {};
    filtered.forEach(function(b) {
        var l = getFirstLetter(b, currentSort);
        if (/[A-Z]/.test(l)) letters[l] = true;
    });
    var alphaHtml = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(function(l) {
        var cls = letters[l] ? '' : ' disabled';
        return '<a href="#letter-' + l + '" class="' + cls + '">' + l + '</a>';
    }).join('');
    document.getElementById('alpha-nav').innerHTML = alphaHtml;

    // Build grid
    var html = '';
    var lastLetter = '';
    filtered.forEach(function(b) {
        var l = getFirstLetter(b, currentSort);
        if (l !== lastLetter && /[A-Z]/.test(l)) {
            html += '<div class="letter-header" id="letter-' + l + '">' + l + '</div>';
            lastLetter = l;
        }
        var cover = b.cover
            ? '<img src="' + b.cover + '" alt="Cover" loading="lazy">'
            : '<div class="no-cover">📖</div>';
        html += '<div class="card" onclick="openModal(' + b.id + ')">' +
            cover +
            '<div class="card-title">' + esc(b.title) + '</div>' +
            '<div class="card-author">' + esc(b.authors.join(', ')) + '</div></div>';
    });

    document.getElementById('grid').innerHTML = html;
    document.getElementById('no-results').style.display = filtered.length ? 'none' : 'block';
    document.getElementById('book-count').textContent = filtered.length;
}

function setSort(mode) {
    currentSort = mode;
    document.getElementById('sort-author').className = mode === 'author' ? 'active' : '';
    document.getElementById('sort-title').className = mode === 'title' ? 'active' : '';
    render();
}

document.getElementById('search').addEventListener('input', function(e) {
    currentSearch = e.target.value;
    render();
});

function openModal(id) {
    var b = BOOKS.find(function(x) { return x.id === id; });
    if (!b) return;
    editingBookId = id;
    var cover = b.cover
        ? '<img src="' + b.cover + '" alt="Cover">'
        : '<div style="font-size:4rem;padding:20px">📖</div>';
    var meta = '';
    if (b.publishers.length) meta += '<span>📚 ' + esc(b.publishers.join(', ')) + '</span>';
    if (b.year) meta += '<span>📅 ' + b.year + '</span>';
    if (b.pages) meta += '<span>📄 ' + b.pages + ' pages</span>';
    if (b.isbn) meta += '<span>ISBN: ' + b.isbn + '</span>';
    if (b.subjects.length) meta += '<span>🏷️ ' + esc(b.subjects.join(', ')) + '</span>';
    var link = b.source_url
        ? '<a class="m-link" href="' + b.source_url + '" target="_blank">View Source ↗</a>'
        : '';
    document.getElementById('modal').innerHTML =
        '<button class="modal-close" onclick="closeModal()">&times;</button>' +
        '<div class="modal-cover">' + cover + '</div>' +
        '<h2>' + esc(b.title) + '</h2>' +
        '<p class="m-author">' + esc(b.authors.join(', ')) + '</p>' +
        '<div class="m-meta">' + meta + '</div>' +
        link;
    document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
    if (!e || e.target === document.getElementById('modal-overlay')) {
        document.getElementById('modal-overlay').classList.remove('open');
    }
}
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
});

render();
</script>
</body>
</html>
